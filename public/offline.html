<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — SRMH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-indigo-50 min-h-screen flex items-center justify-center p-4">
    <div class="text-center max-w-sm">
        <div class="text-6xl mb-4">📡</div>
        <h1 class="text-2xl font-black text-slate-800 mb-2">Không có kết nối</h1>
        <p class="text-sm text-slate-500 mb-6">SRMH cần internet để tải dữ liệu mới nhất. Vui lòng kiểm tra mạng và thử lại.</p>
        <button onclick="location.reload()" class="px-5 py-2.5 bg-indigo-600 text-white text-sm font-bold rounded-xl hover:bg-indigo-700 transition">Thử lại</button>
    </div>
</body>
</html>
